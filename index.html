<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Auto-Scaling Web App</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; padding: 50px; }
        h1 { color: #e94560; font-size: 3em; }
        .info { background: #16213e; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 600px; }
        .status { color: #0f9b8e; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Auto-Scaling Web App</h1>
    <div class="info">
        <p class="status">Server is Running!</p>
        <p>Hosted on AWS EC2 with Auto Scaling and Load Balancer</p>
        <p>Region: Asia Pacific (Mumbai)</p>
    </div>
</body>
</html>
